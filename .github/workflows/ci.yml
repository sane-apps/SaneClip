name: CI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to validate
        required: false
        default: main
        type: string

concurrency:
  group: manual-${{ github.workflow }}-${{ inputs.ref || github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Run verify
        env:
          SANEMASTER_HEADLESS: "1"
        run: ./scripts/SaneMaster.rb verify --quiet
