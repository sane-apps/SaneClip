name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run verify
        env:
          SANEMASTER_HEADLESS: "1"
        run: ./scripts/SaneMaster.rb verify --quiet
