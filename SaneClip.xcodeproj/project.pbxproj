			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "if [ \"$CONFIGURATION\" == \"Release-AppStore\" ]; then\n  echo \"App Store build: stripping Sparkle framework and keys...\"\n  # Remove Sparkle framework from app bundle\n  rm -rf \"${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/Sparkle.framework\"\n  # Strip Sparkle keys from built Info.plist\n  /usr/libexec/PlistBuddy -c \"Delete :SUFeedURL\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\" 2>/dev/null || true\n  /usr/libexec/PlistBuddy -c \"Delete :SUPublicEDKey\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\" 2>/dev/null || true\n  /usr/libexec/PlistBuddy -c \"Delete :SUEnableAutomaticChecks\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\" 2>/dev/null || true\n  /usr/libexec/PlistBuddy -c \"Delete :SUEnableSystemProfiling\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\" 2>/dev/null || true\n  # Strip NSServices (not applicable in sandbox)\n  /usr/libexec/PlistBuddy -c \"Delete :NSServices\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\" 2>/dev/null || true\n  # Strip automation-related usage descriptions (not used in App Store build)\n  /usr/libexec/PlistBuddy -c \"Delete :NSAppleEventsUsageDescription\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\" 2>/dev/null || true\n  /usr/libexec/PlistBuddy -c \"Delete :NSAccessibilityUsageDescription\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\" 2>/dev/null || true\n  # Sparkle can still be strongly linked by SPM; weaken it to prevent launch crashes when framework is stripped.\n  WEAKEN_SCRIPT=\"${SRCROOT}/../../infra/SaneProcess/scripts/weaken_sparkle.rb\"\n  if [ -f \"${WEAKEN_SCRIPT}\" ]; then\n    find \"${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}\" -type f -path \"*/Contents/MacOS/*\" -print0 | \\\n      xargs -0 -I{} ruby \"${WEAKEN_SCRIPT}\" \"{}\" || exit 1\n  fi\n  echo \"App Store build: Sparkle, NSServices, and automation-related keys removed\"\nelif [ \"$CONFIGURATION\" == \"ProdDebug-Setapp\" ] || [ \"$CONFIGURATION\" == \"Release-Setapp\" ]; then\n  echo \"Setapp build: stripping Sparkle framework and direct-store keys...\"\n  rm -rf \"${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/Sparkle.framework\"\n  /usr/libexec/PlistBuddy -c \"Delete :SUFeedURL\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\" 2>/dev/null || true\n  /usr/libexec/PlistBuddy -c \"Delete :SUPublicEDKey\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\" 2>/dev/null || true\n  /usr/libexec/PlistBuddy -c \"Delete :SUEnableAutomaticChecks\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\" 2>/dev/null || true\n  /usr/libexec/PlistBuddy -c \"Delete :SUEnableSystemProfiling\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\" 2>/dev/null || true\n  /usr/libexec/PlistBuddy -c \"Delete :AppStoreProductID\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\" 2>/dev/null || true\n  /usr/libexec/PlistBuddy -c \"Delete :MPSupportedArchitectures\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\" 2>/dev/null || true\n  /usr/libexec/PlistBuddy -c \"Add :MPSupportedArchitectures array\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\"\n  /usr/libexec/PlistBuddy -c \"Add :MPSupportedArchitectures:0 string arm64\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\"\n  /usr/libexec/PlistBuddy -c \"Delete :NSUpdateSecurityPolicy\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\" 2>/dev/null || true\n  /usr/libexec/PlistBuddy -c \"Add :NSUpdateSecurityPolicy dict\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\"\n  /usr/libexec/PlistBuddy -c \"Add :NSUpdateSecurityPolicy:AllowProcesses dict\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\"\n  /usr/libexec/PlistBuddy -c \"Add :NSUpdateSecurityPolicy:AllowProcesses:MEHY5QF425 array\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\"\n  /usr/libexec/PlistBuddy -c \"Add :NSUpdateSecurityPolicy:AllowProcesses:MEHY5QF425:0 string com.setapp.DesktopClient.SetappAgent\" \"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\"\n  SETAPP_KEY_SOURCE=\"${SRCROOT}/Setapp/setappPublicKey.pem\"\n  if [ -f \"${SETAPP_KEY_SOURCE}\" ]; then\n    cp \"${SETAPP_KEY_SOURCE}\" \"${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/setappPublicKey.pem\"\n    echo \"Setapp build: bundled setappPublicKey.pem\"\n  else\n    echo \"warning: Setapp build missing ${SETAPP_KEY_SOURCE}\"\n  fi\n  WEAKEN_SCRIPT=\"${SRCROOT}/../../infra/SaneProcess/scripts/weaken_sparkle.rb\"\n  if [ -f \"${WEAKEN_SCRIPT}\" ]; then\n    find \"${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}\" -type f -path \"*/Contents/MacOS/*\" -print0 | \\\n      xargs -0 -I{} ruby \"${WEAKEN_SCRIPT}\" \"{}\" || exit 1\n  fi\n  echo \"Setapp build: Sparkle removed, Setapp policy applied\"\nfi\n";
