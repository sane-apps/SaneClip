- id: paste-stack-actions
  title: Paste Stack can add, paste, reorder, rename, note, undo, pause, and clear
    items
  surfaces:
  - Clipboard history footer
  - Paste Stack panel
  - Row context menu
  - General settings paste-stack controls
  steps:
  - Add fixture items to the paste stack.
  - Open the stack panel, paste an item, move items, move to top, rename, add a note,
    undo the last paste, pause consumption, and clear the stack.
  - Add three fixture rows to the Merge Queue, close/reopen floating history, switch
    to fixed history and back, and verify the footer still shows all three queued
    items until the user clears or merges them.
  - Verify Basic users see a Pro gate instead of silent no-op controls.
  assertions:
  - Stack controls mutate only the stack fixture.
  - Consumption settings persist and are reflected in the panel.
  - Merge Queue selection is manager state, not view-local state, so it survives
    history view recreation and floating/fixed mode switches.
  - Basic/Pro gates match the public feature boundary.
  evidence:
  - Mini source/test guard for paste-stack UI and manager behavior
  required_proof_level: runtime_visual
  required_evidence_types:
  - mini_runtime
  - screenshot
  - fixture
  historical_failure_classes:
