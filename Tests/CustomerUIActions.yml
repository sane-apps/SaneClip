actions:
- id: status-menu-dock-core-actions
  title: Status menu and Dock menu expose core SaneClip actions
  surfaces:
  - Menu bar status item
  - Right-click status menu
  - Dock menu
  - Main app menu
  steps:
  - Open the shipped status menu and Dock menu.
  - Verify Capture Screenshot, Capture Text from Screen, Show History, recent-item
    paste, Snippets, Clear History, Settings, License, Check for Updates, About /
    Report a Bug, and Quit are wired where applicable.
  - For Quit and update checks, verify the menu item and first safe surface rather
    than publishing or quitting during the sweep.
  assertions:
  - Status and Dock menus are built from the same customer action surface.
  - Utility actions route to the shared SaneUI settings, license, update, about, and
    bug report surfaces.
  - Recent items and snippets can be selected without leaving duplicate app instances.
  evidence:
  - Mini source/test guard for status, Dock, and app menu wiring
  - Screenshot evidence from Mini-rendered SaneClip UI fixtures
  required_proof_level: runtime_visual
  required_evidence_types:
  - mini_runtime
  - screenshot
  - fixture
  - log
  historical_failure_classes:
  - context_menu_extension_missing
  - duplicate_or_stale_menu_item
  - menu_entry_missing
  - install_update_packaging
  - data_loss_or_unexpected_mutation
  - persistence_or_relaunch_reset
  - layout_visual_regression
  - pro_basic_gate_drift
  - external_integration_stub
  - state_count_drift
  - docs_promise_drift
  - activation_noop
  functional_state:
    description: Seeded clipboard history with representative text, URL, code, image,
      snippet, collection, tag, and paste-stack items.
    setup_steps:
    - Load deterministic clipboard/history fixtures before opening customer surfaces.
    - Restore fixture history after destructive row, stack, or clear actions.
    fixture_paths:
    - Tests/Fixtures/customer-ui/clipboard-history/
  user_inputs:
  - Open the shipped status menu and Dock menu.
  - Verify Capture Screenshot, Capture Text from Screen, Show History, recent-item
    paste, Snippets, Clear History, Settings, License, Check for Updates, About /
    Report a Bug, and Quit are wired where applicable.
  - For Quit and update checks, verify the menu item and first safe surface rather
