- id: settings-general-security-history-actions
  title: General settings update startup, appearance, security, history, capture,
    update, and import/export behavior
  surfaces:
  - Settings General tab
  - Login item and Dock controls
  - Security controls
  - History controls
  - Capture controls
  - Software update controls
  - Import and export panels
  steps:
  - Open General settings.
  - Toggle login item, Dock icon, menu bar icon, paste sound, sensitive-data protection,
    Touch ID, encryption, excluded apps, history size, expiry, capture limits, capture
    pause/resume, update checks, import, and export where safe.
  - Pause capture for 5, 15, and 60 minutes and verify the visible countdown decrements
    while the pasteboard is idle.
  - For Touch ID, import/export, update checks, and selected-app panels, verify the
    safe first surface or fixture rather than mutating user data.
  assertions:
  - Settings persist through SettingsModel or the shared SaneUI components.
  - Security-disabling actions authenticate before changing protected state.
  - Capture pause countdown is invalidated by the monitor timer and does not wait
    for a new pasteboard change before updating.
  - External panels are opened only as safe first surfaces in the sweep.
  evidence:
  - Mini source/test guard for settings controls, panel helpers, and existing settings
    tests
  - Settings General screenshot fixture
