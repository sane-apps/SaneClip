- id: history-item-row-actions
  title: Clipboard item rows expose copy, paste, pin, edit, organize, image, and delete
    actions
  surfaces:
  - Clipboard item row
  - Row context menu
  - Edit sheet
  - Image OCR preview sheet
  steps:
  - Use row hover/action and context menu controls for representative text, URL, code,
    and image items.
  - Paste, copy, pin/unpin, edit content, update title/tags/collection/note, copy
    OCR text, export an image, and delete a fixture item.
  - With keep-open pinned in floating and fixed history modes, verify the visual
    keep-open states and the code path that keeps floating and fixed history visible
    while clearing key status before paste.
  - Verify Basic users see Pro gates for Pro-only row actions.
  assertions:
  - Basic pinning remains available.
  - Pro-only paste transforms, organization, notes, and image OCR actions are gated
    or executed correctly.
  - Edits use the batch update path so row metadata and pinned copies stay aligned.
  - Keep-open paste keeps the floating panel and fixed popover visible, clears key
    status before synthetic Cmd+V, and requests front/key restore after direct-build
    paste succeeds.
  evidence:
  - Mini source/test guard for row context actions and edit persistence
  - Existing fixture tests for Basic pinning and image OCR controls
