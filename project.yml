name: SaneClip
options:
  bundleIdPrefix: com.saneclip
  deploymentTarget:
    macOS: 14.0
    iOS: 18.0
  xcodeVersion: 16.0

configs:
  Debug: debug
  ProdDebug: debug
  ProdDebug-Setapp: debug
  Release: release
  Release-AppStore: release
  Release-Setapp: release

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
  Setapp:
    url: https://github.com/MacPaw/Setapp-framework.git
    from: 5.0.1
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
  SaneUI:
    url: https://github.com/sane-apps/SaneUI.git
    revision: 5679b796e8f0e9bc293e9d91f347163d9a107822

settings:
  DEAD_CODE_STRIPPING: YES
  SWIFT_EMIT_LOC_STRINGS: YES
  ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
  ENABLE_HARDENED_RUNTIME: YES
  GENERATE_INFOPLIST_FILE: YES
  # Recommended warnings
  CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
  CLANG_WARN_BOOL_CONVERSION: YES
  CLANG_WARN_COMMA: YES
  CLANG_WARN_CONSTANT_CONVERSION: YES
  CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
  CLANG_WARN_EMPTY_BODY: YES
  CLANG_WARN_ENUM_CONVERSION: YES
  CLANG_WARN_INFINITE_RECURSION: YES
  CLANG_WARN_INT_CONVERSION: YES
  CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
  CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
  CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
  CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
  CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
  CLANG_WARN_STRICT_PROTOTYPES: YES
  CLANG_WARN_SUSPICIOUS_MOVE: YES
  CLANG_WARN_UNREACHABLE_CODE: YES
  CLANG_WARN__DUPLICATE_METHOD_MATCH: YES
  ENABLE_STRICT_OBJC_MSGSEND: YES
  GCC_NO_COMMON_BLOCKS: YES
  GCC_WARN_64_TO_32_BIT_CONVERSION: YES
  GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
  GCC_WARN_UNDECLARED_SELECTOR: YES
  GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
  GCC_WARN_UNUSED_FUNCTION: YES
  GCC_WARN_UNUSED_VARIABLE: YES
  SWIFT_STRICT_CONCURRENCY: complete

schemes:
  SaneClip:
    build:
      targets:
        SaneClip: all
        SaneClipTests: [test]
        SaneClipWidgets: all
    test:
      targets:
        - SaneClipTests
    profile:
      config: Release
    run:
      config: Debug
    archive:
      config: Release

  SaneClip-AppStore:
    build:
      targets:
        SaneClipAppStore: all
        SaneClipWidgets: all
    profile:
      config: Release-AppStore
    run:
      config: Debug
    archive:
      config: Release-AppStore

  SaneClipSetapp:
    build:
      targets:
        SaneClip: all
        SaneClipTests: [test]
        SaneClipWidgets: all
    test:
      targets:
        - SaneClipTests
    profile:
      config: Release-Setapp
    run:
      config: ProdDebug-Setapp
    archive:
      config: Release-Setapp

  SaneClipIOS:
    build:
      targets:
        SaneClipIOS: all
        SaneClipIOSWidgets: all
        SaneClipIOSShare: all
    profile:
      config: Release
    run:
      config: Debug
    archive:
      config: Release

targets:
  SaneClip:
    type: application
    platform: macOS
    bundleId: com.saneclip.app
    deploymentTarget:
      macOS: 14.0
    sources:
      - main.swift
      - SaneClipApp.swift
      - SaneClipAppDelegate+HistoryWindow.swift
      - SaneClipAppDelegate+Menus.swift
      - SaneClipAppDelegate+SingleInstance.swift
      - ProFeature.swift
      - DirectDistributionSupport.swift
      - path: Core
        excludes:
          - "**/CLAUDE.md"
      - path: UI
        excludes:
          - "**/CLAUDE.md"
      - path: Shared
        excludes:
          - "**/CLAUDE.md"
      - Resources
    dependencies:
      - package: KeyboardShortcuts
      - package: Setapp
      - package: Sparkle
      - package: SaneUI
      - target: SaneClipWidgets
        embed: true
        codeSign: true
    info:
      path: SaneClip/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        AppStoreProductID: com.saneclip.app.pro.unlock
        SaneDistributionChannel: direct
        LSUIElement: true
        # Encryption exemption: AES-256-GCM is used solely for local data protection
        # (encrypting clipboard history at rest on the user's device). No encryption is used
        # for communication or transmission. This qualifies under EAR Category 5 Part 2
        # exemption (encryption for data-at-rest/local storage only).
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: "public.app-category.productivity"
        NSAppleEventsUsageDescription: "SaneClip needs to paste clipboard content to other applications."
        NSAccessibilityUsageDescription: "SaneClip uses Accessibility to paste clipboard items directly into applications."
        NSScreenCaptureUsageDescription: "SaneClip captures screenshots you request so it can save the image and optional OCR text locally in your clipboard history."
        # Localizations shipped via Resources/Localizable.xcstrings (machine-translated + web-verified).
        CFBundleLocalizations: [en, de, fr, es, it, pt-BR, ja, zh-Hans, ko]
        # URL Scheme (Phase 3)
        CFBundleURLTypes:
          - CFBundleURLName: "SaneClip URL Scheme"
            CFBundleURLSchemes:
              - saneclip
        # Sparkle Auto-Update Configuration (CRITICAL - was missing!)
        SUFeedURL: "https://saneclip.com/appcast.xml"
        SUPublicEDKey: "7Pl/8cwfb2vm4Dm65AByslkMCScLJ9tbGlwGGx81qYU="
        SUEnableAutomaticChecks: true
        SUEnableInstallerLauncherService: true
        SUEnableSystemProfiling: false
        NSServices:
          - NSMessage: "saveToSaneClip"
            NSPortName: "SaneClip"
            NSSendTypes:
              - "public.plain-text"
            NSMenuItem:
              default: "Save to SaneClip"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_NAME: SaneClip
        PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.app
        MARKETING_VERSION: "2.3.20"
        CURRENT_PROJECT_VERSION: "2320"
        MARKETING_VERSION: "2.3.20"
        CURRENT_PROJECT_VERSION: "2320"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        ENABLE_DEBUG_DYLIB: NO
        SWIFT_VERSION: 6.0
        MACOSX_DEPLOYMENT_TARGET: 14.0
        ARCHS: arm64
        VALID_ARCHS: arm64
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: YES
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.dev
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_ENTITLEMENTS: SaneClip/SaneClipDebug.entitlements
          OTHER_SWIFT_FLAGS: "-D ENABLE_SYNC"
        ProdDebug:
          PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.dev
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_ENTITLEMENTS: SaneClip/SaneClipDebug.entitlements
          OTHER_SWIFT_FLAGS: "-D ENABLE_SYNC"
        ProdDebug-Setapp:
          PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.app-setapp
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_ENTITLEMENTS: SaneClip/SaneClipSetapp.entitlements
          ARCHS: "$(ARCHS_STANDARD)"
          VALID_ARCHS: "arm64 x86_64"
          OTHER_SWIFT_FLAGS: "-D ENABLE_SYNC -D SETAPP"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.app
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_ENTITLEMENTS: SaneClip/SaneClip.entitlements
          PROVISIONING_PROFILE_SPECIFIER: "SaneClip Developer ID"
          OTHER_SWIFT_FLAGS: "-D ENABLE_SYNC"
        Release-AppStore:
          PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.app
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "SaneClip Mac App Store"
          CODE_SIGN_ENTITLEMENTS: SaneClip/SaneClipAppStore.entitlements
          INFOPLIST_KEY_AppStoreProductID: com.saneclip.app.pro.unlock
          OTHER_SWIFT_FLAGS: "-D APP_STORE -D ENABLE_SYNC"
        Release-Setapp:
          PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.app-setapp
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_ENTITLEMENTS: SaneClip/SaneClipSetapp.entitlements
          PROVISIONING_PROFILE_SPECIFIER: "SaneClip Setapp Developer ID 2309"
          ARCHS: "$(ARCHS_STANDARD)"
          VALID_ARCHS: "arm64 x86_64"
          OTHER_SWIFT_FLAGS: "-D ENABLE_SYNC -D SETAPP"
    postCompileScripts:
      - script: |
          if which swiftlint >/dev/null; then
            swiftlint . 2>&1 | sed 's/: error:/: warning:/' || true
          else
            echo "warning: SwiftLint not installed"
          fi
        name: Run SwiftLint
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - script: |
          APP_ICON_SOURCE="${SRCROOT}/Resources/Assets.xcassets/AppIcon.appiconset"
          APP_ICON_DEST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/AppIcon.icns"
          APP_BUNDLE_PATH="${TARGET_BUILD_DIR}/${WRAPPER_NAME}"
          if [ ! -d "${APP_BUNDLE_PATH}" ]; then
            APP_BUNDLE_PATH="${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}"
          fi
          if [ -d "${APP_ICON_SOURCE}" ] && [ -d "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}" ]; then
            TEMP_ICON_ROOT="$(mktemp -d "${DERIVED_FILE_DIR}/SaneClipAppIcon.XXXXXX")"
            TEMP_ICONSET="${TEMP_ICON_ROOT}/AppIcon.iconset"
            mkdir -p "${TEMP_ICONSET}"
            cp "${APP_ICON_SOURCE}/icon_16x16.png" "${TEMP_ICONSET}/icon_16x16.png"
            cp "${APP_ICON_SOURCE}/icon_16x16@2x.png" "${TEMP_ICONSET}/icon_16x16@2x.png"
            cp "${APP_ICON_SOURCE}/icon_32x32.png" "${TEMP_ICONSET}/icon_32x32.png"
            cp "${APP_ICON_SOURCE}/icon_32x32@2x.png" "${TEMP_ICONSET}/icon_32x32@2x.png"
            cp "${APP_ICON_SOURCE}/icon_128x128.png" "${TEMP_ICONSET}/icon_128x128.png"
            cp "${APP_ICON_SOURCE}/icon_128x128@2x.png" "${TEMP_ICONSET}/icon_128x128@2x.png"
            cp "${APP_ICON_SOURCE}/icon_256x256.png" "${TEMP_ICONSET}/icon_256x256.png"
            cp "${APP_ICON_SOURCE}/icon_256x256@2x.png" "${TEMP_ICONSET}/icon_256x256@2x.png"
            cp "${APP_ICON_SOURCE}/icon_512x512.png" "${TEMP_ICONSET}/icon_512x512.png"
            cp "${APP_ICON_SOURCE}/icon_512x512@2x.png" "${TEMP_ICONSET}/icon_512x512@2x.png"
            iconutil -c icns "${TEMP_ICONSET}" -o "${APP_ICON_DEST}"
            ICON_WIDTH="$(sips -g pixelWidth "${APP_ICON_DEST}" 2>/dev/null | awk '/pixelWidth:/ { print $2; exit }')"
            if [ "${ICON_WIDTH:-0}" -lt 512 ]; then
              echo "error: AppIcon.icns must include at least a 512px representation for Setapp upload"
              exit 1
            fi
            echo "App icon regenerated with ${ICON_WIDTH}px maximum representation"
          fi

          if [ "$CONFIGURATION" == "Release-AppStore" ]; then
            echo "App Store build: stripping Sparkle framework and keys..."
            # Remove Sparkle framework from app bundle
            rm -rf "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/Sparkle.framework"
            # Strip Sparkle keys from built Info.plist
            /usr/libexec/PlistBuddy -c "Delete :SUFeedURL" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :SUPublicEDKey" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Delete :SUEnableAutomaticChecks" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Delete :SUEnableSystemProfiling" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Delete :SUEnableInstallerLauncherService" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            # Strip NSServices (not applicable in sandbox)
            /usr/libexec/PlistBuddy -c "Delete :NSServices" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            # Strip automation-related usage descriptions (not used in App Store build)
            /usr/libexec/PlistBuddy -c "Delete :NSAppleEventsUsageDescription" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :NSAccessibilityUsageDescription" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            # Sparkle can still be strongly linked by SPM; weaken it to prevent launch crashes when framework is stripped.
            WEAKEN_SCRIPT="${SRCROOT}/../../infra/SaneProcess/scripts/weaken_sparkle.rb"
            if [ -f "${WEAKEN_SCRIPT}" ]; then
              find "${APP_BUNDLE_PATH}" -type f -path "*/Contents/MacOS/*" -exec ruby "${WEAKEN_SCRIPT}" {} \; || exit 1
              STRONG_SPARKLE_LINKS="$(find "${APP_BUNDLE_PATH}" -type f -path "*/Contents/MacOS/*" -exec sh -c 'otool -L "$1" 2>/dev/null | grep "Sparkle.framework" | grep -v "weak" >/dev/null && printf "%s\n" "$1"' sh {} \;)"
              if [ -n "${STRONG_SPARKLE_LINKS}" ]; then
                echo "error: Sparkle.framework is still strongly linked after stripping:"
                echo "${STRONG_SPARKLE_LINKS}"
                exit 1
              fi
            fi
            echo "App Store build: Sparkle, NSServices, and automation-related keys removed"
          elif [ "$CONFIGURATION" == "ProdDebug-Setapp" ] || [ "$CONFIGURATION" == "Release-Setapp" ]; then
            echo "Setapp build: stripping Sparkle framework and direct-store keys..."
            rm -rf "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/Sparkle.framework"
            /usr/libexec/PlistBuddy -c "Delete :SUFeedURL" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :SUPublicEDKey" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Delete :SUEnableAutomaticChecks" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Delete :SUEnableSystemProfiling" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Delete :SUEnableInstallerLauncherService" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :AppStoreProductID" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :NSAppleEventsUsageDescription" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :MPSupportedArchitectures" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :MPSupportedArchitectures array" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
            /usr/libexec/PlistBuddy -c "Add :MPSupportedArchitectures:0 string arm64" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
            /usr/libexec/PlistBuddy -c "Add :MPSupportedArchitectures:1 string x86_64" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
            /usr/libexec/PlistBuddy -c "Delete :NSUpdateSecurityPolicy" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :NSUpdateSecurityPolicy dict" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
            /usr/libexec/PlistBuddy -c "Add :NSUpdateSecurityPolicy:AllowProcesses dict" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
            /usr/libexec/PlistBuddy -c "Add :NSUpdateSecurityPolicy:AllowProcesses:MEHY5QF425 array" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
            /usr/libexec/PlistBuddy -c "Add :NSUpdateSecurityPolicy:AllowProcesses:MEHY5QF425:0 string com.setapp.DesktopClient.SetappAgent" "${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
            SETAPP_KEY_SOURCE="${SRCROOT}/Setapp/setappPublicKey.pem"
            if [ -f "${SETAPP_KEY_SOURCE}" ]; then
              cp "${SETAPP_KEY_SOURCE}" "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/setappPublicKey.pem"
              echo "Setapp build: bundled setappPublicKey.pem"
            else
              echo "warning: Setapp build missing ${SETAPP_KEY_SOURCE}"
            fi
            WEAKEN_SCRIPT="${SRCROOT}/../../infra/SaneProcess/scripts/weaken_sparkle.rb"
            if [ -f "${WEAKEN_SCRIPT}" ]; then
              find "${APP_BUNDLE_PATH}" -type f -path "*/Contents/MacOS/*" -exec ruby "${WEAKEN_SCRIPT}" {} \; || exit 1
              STRONG_SPARKLE_LINKS="$(find "${APP_BUNDLE_PATH}" -type f -path "*/Contents/MacOS/*" -exec sh -c 'otool -L "$1" 2>/dev/null | grep "Sparkle.framework" | grep -v "weak" >/dev/null && printf "%s\n" "$1"' sh {} \;)"
              if [ -n "${STRONG_SPARKLE_LINKS}" ]; then
                echo "error: Sparkle.framework is still strongly linked after stripping:"
                echo "${STRONG_SPARKLE_LINKS}"
                exit 1
              fi
            fi
            echo "Setapp build: Sparkle removed, Setapp policy applied"
          fi
        name: Strip Sparkle for App Store
        basedOnDependencyAnalysis: false

  SaneClipAppStore:
    type: application
    platform: macOS
    bundleId: com.saneclip.app
    deploymentTarget:
      macOS: 14.0
    sources:
      - main.swift
      - SaneClipApp.swift
      - SaneClipAppDelegate+HistoryWindow.swift
      - SaneClipAppDelegate+Menus.swift
      - SaneClipAppDelegate+SingleInstance.swift
      - ProFeature.swift
      - DirectDistributionSupport.swift
      - path: Core
        excludes:
          - "**/CLAUDE.md"
      - path: UI
        excludes:
          - "**/CLAUDE.md"
      - path: Shared
        excludes:
          - "**/CLAUDE.md"
      - Resources
    dependencies:
      - package: KeyboardShortcuts
      - package: SaneUI
      - target: SaneClipWidgets
        embed: true
        codeSign: true
    info:
      path: SaneClip/Info-AppStore.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        AppStoreProductID: com.saneclip.app.pro.unlock
        SaneDistributionChannel: appstore
        LSUIElement: true
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: "public.app-category.productivity"
        NSScreenCaptureUsageDescription: "SaneClip captures screenshots you request so it can save the image and optional OCR text locally in your clipboard history."
        CFBundleURLTypes:
          - CFBundleURLName: "SaneClip URL Scheme"
            CFBundleURLSchemes:
              - saneclip
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_NAME: SaneClip
        PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.app
        MARKETING_VERSION: "2.3.20"
        CURRENT_PROJECT_VERSION: "2320"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: 6.0
        MACOSX_DEPLOYMENT_TARGET: 14.0
        ARCHS: arm64
        VALID_ARCHS: arm64
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: YES
        DEVELOPMENT_TEAM: M78L6FXD48
        OTHER_SWIFT_FLAGS: "$(inherited) -D APP_STORE -D ENABLE_SYNC"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.app
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_ENTITLEMENTS: SaneClip/SaneClipAppStore.entitlements
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.app
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_ENTITLEMENTS: SaneClip/SaneClipAppStore.entitlements
        Release-AppStore:
          PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.app
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "SaneClip Mac App Store"
          CODE_SIGN_ENTITLEMENTS: SaneClip/SaneClipAppStore.entitlements

  SaneClipTests:
    type: bundle.unit-test
    platform: macOS
    bundleId: com.saneclip.appTests
    deploymentTarget:
      macOS: 14.0
    testTarget: SaneClip
    sources:
      - Tests
    dependencies:
      - target: SaneClip
    settings:
      base:
        CODE_SIGN_STYLE: Manual
      configs:
        Debug:
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"
        ProdDebug:
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"
        ProdDebug-Setapp:
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"
        Release-Setapp:
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"

  SaneClipWidgets:
    type: app-extension
    platform: macOS
    bundleId: com.saneclip.app.widgets
    deploymentTarget:
      macOS: 14.0
    sources:
      - Widgets
      - path: Core/Models/WidgetClipboardItem.swift
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: SaneClip Widgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: SaneClipWidgets
        PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.app.widgets
        MARKETING_VERSION: "2.3.20"
        CURRENT_PROJECT_VERSION: "2320"
        MARKETING_VERSION: "2.3.20"
        CURRENT_PROJECT_VERSION: "2320"
        SWIFT_VERSION: 6.0
        CODE_SIGN_STYLE: Manual
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks @executable_path/../../../../Frameworks"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.dev.widgets
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_ENTITLEMENTS: Widgets/SaneClipWidgetsDebug.entitlements
        ProdDebug:
          PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.dev.widgets
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_ENTITLEMENTS: Widgets/SaneClipWidgetsDebug.entitlements
        ProdDebug-Setapp:
          PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.app-setapp.widgets
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_ENTITLEMENTS: Widgets/SaneClipWidgets.entitlements
          ARCHS: "$(ARCHS_STANDARD)"
          VALID_ARCHS: "arm64 x86_64"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.saneclip.app.widgets
          DEVELOPMENT_TEAM: M78L6FXD48
          CODE_SIGN_IDENTITY: "Developer ID Application"
